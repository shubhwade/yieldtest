version: '3.8'

services:
  # 1. Database Service
  mongodb:
    image: mongo:7.0
    container_name: yieldlens-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: yieldlens

  # 2. Redis Cache Service
  redis:
    image: redis:7.0-alpine
    container_name: yieldlens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Python Flask API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yieldlens-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/yieldlens
      - MONGODB_DB_NAME=yieldlens
      - REDIS_URL=redis://redis:6379/0
      - FRED_API_KEY=b91d828046a85e43f8ef8d0d3cf29f29
      - GEMINI_API_KEY=AIzaSyA_zpO7UX5zt4t3Z6_tyNAmB3ifF6mC1RY
      - ALPHA_VANTAGE_API_KEY=AE11PZPHI2X5SZ09
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
    depends_on:
      - mongodb
      - redis

  # 4. Next.js Client Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yieldlens-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - PORT=3000
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
