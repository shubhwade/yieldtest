version: 1
services:
  # 1. Backend API Service
  - type: web
    name: "yieldlens-api-v1"
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k eventlet -w 1 app:app"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: "yieldlens-redis-v1"
          property: connectionString

  # 2. Frontend Client Service
  - type: web
    name: "yieldlens-web-v1"
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false

  # 3. Redis Instance
  - type: redis
    name: "yieldlens-redis-v1"
    plan: free
    ipAllowList: []
