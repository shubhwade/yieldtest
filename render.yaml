version: 1
services:
  - type: web
    name: "yieldlens-api-v1"
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k eventlet -w 1 app:app"
    envVars:
      - key: MONGODB_URI
      - key: FRED_API_KEY
      - key: GEMINI_API_KEY
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: "yieldlens-redis-v1"
          property: connectionString

  - type: web
    name: "yieldlens-web-v1"
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: "yieldlens-api-v1"
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: "yieldlens-api-v1"
          property: url

redises:
  - name: "yieldlens-redis-v1"
    plan: free
