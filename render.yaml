services:
  # 1. Backend API Service (Flask)
  - type: web
    name: yieldlens-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MONGODB_URI
        sync: false # Set this securely in the Render Dashboard Environment Variables
      - key: REDIS_URL
        fromService:
          type: redis
          name: yieldlens-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Client Service (Next.js)
  - type: web
    name: yieldlens-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: yieldlens-backend
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: yieldlens-backend
          property: url

databases:
  # Managed Redis Cache (Standard for Render)
  - name: yieldlens-cache
    type: redis
    plan: free
    ipAllowList: [] # Only allow internal traffic
